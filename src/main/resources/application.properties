spring.application.name=spring-vulnerable-lab
server.port=8081

# Sprint 03 - Fase 3: segredo JWT lido de variável de ambiente; fallback só para dev local
app.jwt.secret=${JWT_SECRET:VulnerableLabSuperSecretKeyForJwtHS256AtLeast256BitsLong!}
app.jwt.expiration-ms=3600000

# Sprint 03 - Fase 3: CORS externalizado — sem origem hardcoded no código
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8081}

# Sprint 03 - Fase 3: respostas de erro sem detalhe interno (aplicado em todos os profiles)
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
