# =====================================================================
# Sprint 03 - Fase 3: perfil PROD — sem H2, sem SQL logs, sem console
# Ativar: -Dspring.profiles.active=prod  ou  SPRING_PROFILES_ACTIVE=prod
# JWT_SECRET e CORS_ORIGINS DEVEM ser definidos como variáveis de ambiente
# =====================================================================

spring.datasource.url=jdbc:h2:mem:vulnerablelab
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Console H2 desabilitado em produção — prevenção de vazamento de dados
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console
