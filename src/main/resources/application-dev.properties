# =====================================================================
# Sprint 03 - Fase 3: perfil DEV — banco H2 visível, logs SQL ativos
# Ativar: -Dspring.profiles.active=dev  ou  SPRING_PROFILES_ACTIVE=dev
# =====================================================================

spring.datasource.url=jdbc:h2:mem:vulnerablelab
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 habilitado apenas em dev para inspeção do banco
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
